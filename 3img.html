<!DOCTYPE html>
<html>
<head>
	<title> Image </title>
	
	<style>
		.container{
			position:relative;
			width:300px;
			height:200px;
			margin:100px;
			border-radius:10px;
		}
		
		.container img{
			position:absolute;
			width:150px;
			height:150px;
			transition :0.3s;
		}
		
		.img1{
			left:0;
			z-index:1;
		}
		
		.img2{
			left:60px;
			z-index:2;
		}
		
		.img3{
			left:120px;
			z-index:3
		}
		
		.container img:hover{
			transform : scale(1.5);
			z-index:10;
		}
		</style>
		
</head>
<body>
<div class="container">
	<img src="https://www.abcbasket.in/product/apple/" class="img1" >
	<img src="https://www.abcbasket.in/product/apple/" class="img2">
	<img src="https://www.abcbasket.in/product/apple/" class="img3">
</div>
</body>
</html>
